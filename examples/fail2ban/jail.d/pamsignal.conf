[pamsignal]
enabled = true
filter = pamsignal
backend = systemd
journalmatch = SYSLOG_IDENTIFIER=pamsignal
# Block all traffic from the attacker's IP (all ports)
banaction = iptables-allports
# Note: If your system uses ufw or firewalld, use one of these instead:
# banaction = ufw
# banaction = firewallcmd-allports

# pamsignal already handles the brute-force threshold (e.g., 5 attempts in 5 mins).
# When fail2ban sees this event once, it means the threshold was reached, so ban immediately.
maxretry = 1

# Ban duration (e.g., 24 hours)
bantime = 24h
