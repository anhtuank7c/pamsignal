name: Build release packages

# Triggered automatically when a release is published. Use workflow_dispatch
# to test the pipeline against any tag/branch without creating a release, or
# to backfill artifacts on an existing release (set the `attach_to_release`
# input).
#
# Manual run examples:
#   gh workflow run release-packages.yml -f ref=v0.1.0
#   gh workflow run release-packages.yml -f ref=v0.1.0 -f attach_to_release=true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build"
        required: false
        default: ""
      attach_to_release:
        description: "Attach the built packages to the GitHub release matching `ref` (must already exist)"
        required: false
        default: "false"

permissions:
  # softprops/action-gh-release needs write access to upload assets to a release.
  contents: write

jobs:
  # --- Debian / Ubuntu ---
  build-deb:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          # Full history so dpkg-genchanges and any future git-derived metadata
          # can introspect the tree without surprises.
          fetch-depth: 0

      # Cache the .deb archives apt downloads. On cache hit, apt-get install
      # below reuses them instead of re-downloading from the mirror. We cache
      # FILES (not installed state), then always run apt-get install — this
      # is more robust than third-party "cache + install" actions that try
      # to skip apt entirely on cache hit.
      - name: Restore apt archive cache
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/apt/archives/*.deb
            /var/cache/apt/archives/partial
          key: apt-${{ runner.os }}-${{ hashFiles('debian/control') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          # build-essential is implicitly required by dpkg-checkbuilddeps;
          # pulled in here explicitly so a slim runner image still satisfies it.
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper meson ninja-build pkg-config \
            libsystemd-dev libcmocka-dev

      - name: Show toolchain
        run: |
          dpkg-buildpackage --version | head -1
          meson --version
          gcc --version | head -1

      - name: Build .deb (runs `meson test` via dh_auto_test)
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p out
          # dpkg-buildpackage writes into the parent directory. Move into a
          # known location for upload + release attach.
          mv ../pamsignal_*.deb        out/ 2>/dev/null || true
          mv ../pamsignal-*.ddeb       out/ 2>/dev/null || true
          mv ../pamsignal_*.changes    out/ 2>/dev/null || true
          mv ../pamsignal_*.buildinfo  out/ 2>/dev/null || true
          ls -la out/

      - name: Inspect package
        run: |
          deb=$(ls out/pamsignal_*.deb | head -1)
          echo "::group::dpkg-deb -I"
          dpkg-deb -I "$deb"
          echo "::endgroup::"
          echo "::group::dpkg-deb -c"
          dpkg-deb -c "$deb"
          echo "::endgroup::"

      - name: Sign artifacts (detached .asc per file)
        if: github.event_name == 'release' || inputs.attach_to_release == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          # Configure gpg for non-interactive (loopback) pinentry.
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          # Import the project signing key from secret.
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Detached armored signature for each shippable file. The apt repo
          # itself is verified via the signed Release/InRelease in the
          # publish-repo job, but per-file .asc is useful for direct
          # downloads from the GitHub release page.
          for f in out/*.deb out/*.ddeb; do
            [ -f "$f" ] || continue
            gpg --batch --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --default-key "$GPG_KEY_ID" \
                --detach-sign --armor -o "$f.asc" "$f"
          done
          ls -la out/*.asc

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v7
        with:
          name: pamsignal-deb-${{ github.run_number }}
          path: out/*
          if-no-files-found: error

      - name: Attach to GitHub release
        if: github.event_name == 'release' || inputs.attach_to_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.ref }}
          files: |
            out/*.deb
            out/*.ddeb
            out/*.asc

  # --- RPM builds (Fedora + EL9) ---
  #
  # Matrix produces:
  #   - pamsignal-X.Y.Z-1.fcNN.* — Fedora N
  #   - pamsignal-X.Y.Z-1.el9.* — installs on AlmaLinux 9, Rocky Linux 9, RHEL 9
  #     (RHEL clones are bit-for-bit binary compatible at the .el9 dist tag, so
  #     a single el9 build covers all three).
  build-rpm:
    name: Build .rpm (${{ matrix.target.name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: fedora
            image: fedora:latest
            # Fedora ships meson + systemd-rpm-macros in the base repos.
            repo_setup: ""
          - name: el9
            image: almalinux:9
            # RHEL 9 family doesn't ship meson in base. EPEL provides it; CRB
            # (CodeReady Builder) provides systemd-rpm-macros and other -devel
            # bits the build needs.
            repo_setup: |
              dnf install -y dnf-plugins-core epel-release
              dnf config-manager --set-enabled crb
    container:
      image: ${{ matrix.target.image }}
    steps:
      # actions/checkout uses git, and the bare distro containers ship without
      # it. Install before we check out, plus the build toolchain so the
      # cache step has something concrete to populate later.
      - name: Install build tooling
        run: |
          ${{ matrix.target.repo_setup }}
          dnf install -y --setopt=install_weak_deps=False \
            git tar gzip rpm-build rpmdevtools rpm-sign gnupg2 \
            meson ninja-build gcc pkgconf-pkg-config \
            systemd-devel systemd-rpm-macros libcmocka-devel

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      # Container filesystem is ephemeral, so dnf metadata + downloaded RPMs
      # survive across runs only via this cache. Keyed per matrix entry +
      # spec so a BuildRequires change or different distro invalidates
      # correctly.
      - name: Cache DNF state
        uses: actions/cache@v5
        with:
          path: |
            /var/cache/dnf
            /var/lib/dnf
          key: dnf-${{ matrix.target.name }}-${{ hashFiles('pamsignal.spec') }}
          restore-keys: |
            dnf-${{ matrix.target.name }}-

      - name: Mark workspace safe for git (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Show toolchain
        run: |
          rpmbuild --version
          meson --version
          gcc --version | head -1

      - name: Build SRPM and RPM
        run: |
          rpmdev-setuptree
          VERSION=$(rpmspec -q --queryformat='%{version}\n' pamsignal.spec | head -n1)
          echo "Building pamsignal ${VERSION} for ${{ matrix.target.name }}"
          # Source tarball must match Source0 (%{name}-%{version}.tar.gz) and
          # the prefix must match %autosetup -n. git archive HEAD captures the
          # current ref's tree exactly.
          git archive --format=tar.gz \
            --prefix="pamsignal-${VERSION}/" \
            -o ~/rpmbuild/SOURCES/pamsignal-${VERSION}.tar.gz HEAD
          rpmbuild -ba pamsignal.spec

      - name: Collect artifacts
        run: |
          mkdir -p out
          find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec cp -v {} out/ \;
          ls -la out/

      - name: Inspect package
        run: |
          for rpm in out/*.rpm; do
            echo "::group::rpm -qpi $rpm"
            rpm -qpi "$rpm"
            echo "::endgroup::"
            echo "::group::rpm -qpl $rpm"
            rpm -qpl "$rpm"
            echo "::endgroup::"
          done

      - name: Sign RPMs (embedded + detached)
        if: github.event_name == 'release' || inputs.attach_to_release == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          # Strategy: don't override __gpg_sign_cmd. Custom overrides have
          # subtle expansion issues for %{__plaintext_filename} on some rpm
          # versions. Instead use the system default sign command and
          # pre-cache the passphrase in gpg-agent so the default's
          # pinentry-mode=error path is satisfied without prompting.
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          {
            echo "allow-loopback-pinentry"
            echo "default-cache-ttl 7200"
            echo "max-cache-ttl 7200"
          } >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          gpgconf --launch gpg-agent

          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

          # Warm up the agent: a tiny --passphrase sign populates the cache.
          # Subsequent rpm --addsign goes through gpg-agent and finds the
          # cached passphrase without prompting.
          echo warmup | gpg --batch --pinentry-mode loopback \
                            --passphrase "$GPG_PASSPHRASE" \
                            --local-user "$GPG_KEY_ID" \
                            --sign --output /dev/null

          # Minimal rpmmacros — just point rpm at the key. Macro lines must
          # start at column 0 (rpm ignores indented lines) so we use echo
          # rather than a heredoc that would inherit YAML indentation.
          {
            echo '%_signature gpg'
            echo "%_gpg_name $GPG_KEY_ID"
          } > ~/.rpmmacros

          # Embedded signatures (mutates each .rpm in place). dnf checks
          # these via gpgcheck=1 in the published .repo file.
          rpm --addsign out/*.rpm

          # Detached armored signatures for direct-download verification.
          printf '%s' "$GPG_PASSPHRASE" > /tmp/.gpg-pass
          chmod 600 /tmp/.gpg-pass
          for rpm in out/*.rpm; do
            gpg --batch --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-pass \
                --default-key "$GPG_KEY_ID" \
                --detach-sign --armor -o "$rpm.asc" "$rpm"
          done
          rm -f /tmp/.gpg-pass

          # Verify each rpm's embedded sig. Modern rpm -K prints things like
          # "Header V4 RSA/SHA256 Signature, key ID xxxxxxxx: OK" — we look
          # for 'NOT OK' / 'BAD' as the failure markers and assume any other
          # output is a successful verification.
          # Process substitution `<(...)` is a bashism; the EL9 minimal
          # container runs steps under /bin/sh which doesn't support it.
          # Use a temp file for portability across both Fedora and EL9.
          gpg --armor --export "$GPG_KEY_ID" > /tmp/pubkey.asc
          rpm --import /tmp/pubkey.asc
          rm -f /tmp/pubkey.asc
          for rpm in out/*.rpm; do
            output=$(rpm -K "$rpm")
            echo "$output"
            if echo "$output" | grep -qE 'NOT OK|BAD'; then
              echo "::error::Signature verification failed for $rpm"
              exit 1
            fi
          done

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v7
        with:
          name: pamsignal-rpm-${{ matrix.target.name }}-${{ github.run_number }}
          path: |
            out/*.rpm
            out/*.asc
          if-no-files-found: error

      - name: Attach to GitHub release
        if: github.event_name == 'release' || inputs.attach_to_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.ref }}
          files: |
            out/*.rpm
            out/*.asc

  # --- Functional test: install the .deb, exercise the daemon end-to-end ---
  test-deb:
    name: Test .deb (install + functional + uninstall)
    runs-on: ubuntu-24.04
    needs: build-deb
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v7
        with:
          name: pamsignal-deb-${{ github.run_number }}
          path: ./out

      - name: Install pamsignal
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ./out/pamsignal_*.deb jq openssl
          which pamsignal
          systemctl is-active pamsignal

      - name: Generate trusted self-signed cert for localhost
        run: |
          # The URL validator only accepts https://, so the mock webhook must
          # serve TLS. A self-signed cert added to the system trust store
          # (which curl reads via /etc/ssl/certs) lets pamsignal's curl child
          # validate the connection without --insecure.
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 1 -nodes -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          sudo cp /tmp/cert.pem /usr/local/share/ca-certificates/test.crt
          sudo update-ca-certificates

      - name: Start mock HTTPS webhook collector
        run: |
          cat > /tmp/mock-webhook.py <<'PY'
          import http.server, ssl, sys, os
          ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
          ctx.load_cert_chain('/tmp/cert.pem', '/tmp/key.pem')

          class H(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  n = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(n).decode('utf-8', errors='replace')
                  with open('/tmp/webhook-events.log', 'a') as f:
                      f.write(body + '\n')
                  self.send_response(200)
                  self.end_headers()

              def log_message(self, *a):
                  pass  # quiet

          srv = http.server.HTTPServer(('127.0.0.1', 8443), H)
          srv.socket = ctx.wrap_socket(srv.socket, server_side=True)
          srv.serve_forever()
          PY
          : > /tmp/webhook-events.log
          python3 -u /tmp/mock-webhook.py &
          echo $! > /tmp/mock-webhook.pid
          sleep 1
          # Smoke-test from the runner: confirms cert trust and that the
          # collector is reachable BEFORE we point pamsignal at it.
          curl -sf -X POST https://localhost:8443/test \
            -H 'Content-Type: application/json' \
            -d '{"smoke":"ok"}'
          test -s /tmp/webhook-events.log
          : > /tmp/webhook-events.log

      - name: Configure pamsignal for the test webhook
        run: |
          sudo tee /etc/pamsignal/pamsignal.conf >/dev/null <<'CONF'
          # Test config — points at the local mock webhook.
          webhook_url = https://localhost:8443/events
          fail_threshold = 3
          fail_window_sec = 60
          alert_cooldown_sec = 0
          max_tracked_ips = 10
          CONF
          sudo chown root:pamsignal /etc/pamsignal/pamsignal.conf
          sudo chmod 0640 /etc/pamsignal/pamsignal.conf
          sudo systemctl restart pamsignal
          sleep 1
          systemctl is-active pamsignal
          sudo journalctl -t pamsignal --since '10 sec ago' --no-pager | tail -10

      - name: Inject synthetic sshd events via logger
        run: |
          # logger writes to /dev/log -> systemd-journald with
          # SYSLOG_IDENTIFIER=sshd, which matches pamsignal's sd_journal filter.
          # The daemon parses these as if they came from real sshd.
          logger -t sshd "Failed password for root from 203.0.113.50 port 39182 ssh2"
          logger -t sshd "Failed password for root from 203.0.113.50 port 39183 ssh2"
          logger -t sshd "Failed password for root from 203.0.113.50 port 39184 ssh2"
          logger -t sshd "Accepted password for admin from 192.168.1.100 port 52341 ssh2"
          # Wait for the daemon's event loop (1s sd_journal_wait) plus curl
          # round-trip to the mock webhook.
          sleep 5
          echo "::group::Daemon journal output"
          sudo journalctl -t pamsignal --since '30 sec ago' --no-pager
          echo "::endgroup::"
          echo "::group::Webhook events received"
          jq -c . < /tmp/webhook-events.log || cat /tmp/webhook-events.log
          echo "::endgroup::"

      - name: Verify ECS payload structure
        run: |
          # Each line is one ECS-shaped event. Count by event.action.
          login_failures=$(jq -r 'select(.event.action == "login_failure")
                                   | .event.action' \
                            /tmp/webhook-events.log | wc -l)
          login_successes=$(jq -r 'select(.event.action == "login_success")
                                    | .event.action' \
                            /tmp/webhook-events.log | wc -l)
          brute=$(jq -r 'select(.event.action == "brute_force_detected")
                          | .event.action' \
                  /tmp/webhook-events.log | wc -l)
          echo "login_failure=$login_failures login_success=$login_successes brute=$brute"
          # Threshold=3 → exactly 3 login_failure events fire before brute hits;
          # the brute-force alert fires once on the third failure.
          test "$login_failures" -ge 3
          test "$login_successes" -ge 1
          test "$brute" -ge 1
          # Verify ECS shape on the FIRST login_failure event. Combining the
          # action and port predicates inside select() keeps the filter
          # tight to one event so jq -e doesn't see false outputs from the
          # other (port=39183/39184) failures.
          jq -e 'select(.event.action == "login_failure"
                         and .source.port == 39182)
                  | .["@timestamp"] and .event.module == "pamsignal"
                    and (.event.category | contains(["authentication"]))
                    and .event.severity == 5
                    and .source.ip == "203.0.113.50"
                    and .user.name == "root"
                    and .service.name == "sshd"
                    and .pamsignal.auth_method == "password"' \
              /tmp/webhook-events.log >/dev/null
          # Verify brute-force kind=alert per ECS guidance.
          jq -e 'select(.event.action == "brute_force_detected")
                  | .event.kind == "alert"
                    and .event.severity == 8
                    and .pamsignal.attempts >= 3' \
              /tmp/webhook-events.log >/dev/null
          echo "ECS payload structure verified"

      - name: Verify SIGHUP reload works
        run: |
          sudo systemctl reload pamsignal
          sleep 2
          sudo journalctl -t pamsignal --since '10 sec ago' --no-pager \
            | grep -q "config reloaded"

      - name: Stop mock webhook
        if: always()
        run: |
          if [ -f /tmp/mock-webhook.pid ]; then
            kill "$(cat /tmp/mock-webhook.pid)" 2>/dev/null || true
          fi

      - name: Purge pamsignal and verify cleanup
        run: |
          sudo apt-get purge -y pamsignal
          ! command -v pamsignal
          [ ! -f /usr/lib/systemd/system/pamsignal.service ]
          [ ! -d /etc/pamsignal ]
          # The pamsignal user is intentionally retained (it may own journal
          # entries written while the daemon was alive).
          getent passwd pamsignal >/dev/null && \
            echo "pamsignal user retained as expected"

  # --- Sanity test: install the .rpm in the matching distro container ---
  test-rpm:
    name: Test .rpm (install + uninstall in ${{ matrix.target }})
    runs-on: ubuntu-24.04
    needs: build-rpm
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora
            image: fedora:latest
            repo_setup: ""
          - target: el9
            image: almalinux:9
            repo_setup: |
              dnf install -y dnf-plugins-core epel-release
              dnf config-manager --set-enabled crb
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install runtime deps
        run: |
          ${{ matrix.repo_setup }}
          # Don't pre-install `curl` — AlmaLinux ships curl-minimal which
          # conflicts with full curl, and pamsignal.spec already declares
          # Requires: curl so dnf install of the .rpm pulls whatever curl
          # variant is on the box.
          dnf install -y --setopt=install_weak_deps=False shadow-utils \
            systemd which findutils

      - name: Download .rpm artifact
        uses: actions/download-artifact@v7
        with:
          name: pamsignal-rpm-${{ matrix.target }}-${{ github.run_number }}
          path: ./out

      - name: Install pamsignal
        run: |
          # Install the binary RPM, skipping debuginfo/debugsource/src.rpm.
          binary_rpm=$(ls out/pamsignal-[0-9]*.x86_64.rpm | grep -v debuginfo \
                        | grep -v debugsource | head -1)
          echo "Installing $binary_rpm"
          dnf install -y "$binary_rpm"

      - name: Verify file layout and metadata
        run: |
          # Files at expected paths
          test -x /usr/bin/pamsignal
          test -f /usr/lib/systemd/system/pamsignal.service
          test -f /etc/pamsignal/pamsignal.conf
          # ExecStart was patched at build time
          grep -q '^ExecStart=/usr/bin/pamsignal' \
            /usr/lib/systemd/system/pamsignal.service
          # System user created by %pre
          getent passwd pamsignal
          # Config perms set by %post
          perms=$(stat -c '%U:%G %a' /etc/pamsignal/pamsignal.conf)
          echo "Config perms: $perms"
          [ "$perms" = "root:pamsignal 640" ]
          # rpm metadata sanity
          rpm -q pamsignal
          rpm -V pamsignal || true  # mtime / md5 drift on conf is OK

      - name: Smoke-launch the binary (no systemd in container)
        run: |
          # Containers don't run systemd, so we can't exercise the full
          # daemon. Just confirm the binary starts and the foreground arg
          # is recognised — it'll exit shortly after on missing journal.
          mkdir -p /run/pamsignal
          chown pamsignal:pamsignal /run/pamsignal
          chmod 0750 /run/pamsignal
          # `runuser` is preferred over `sudo` in minimal containers.
          timeout 3 runuser -u pamsignal -- /usr/bin/pamsignal --foreground \
            2>&1 | head -5 || true
          echo "binary launches without crashing"

      - name: Uninstall and verify cleanup
        run: |
          dnf remove -y pamsignal
          ! command -v pamsignal
          # The pamsignal user is intentionally retained.
          getent passwd pamsignal >/dev/null && \
            echo "pamsignal user retained as expected"

  # --- Publish signed apt + dnf repository to gh-pages ---
  #
  # Runs after both build matrices and both test matrices succeed on a
  # release: published event. Assembles a static apt repo (Debian/Ubuntu)
  # and dnf repos (Fedora + EL9) under a gh-pages branch that GitHub Pages
  # serves at https://<owner>.github.io/<repo>/. Users add a one-line
  # source / .repo entry and apt/dnf installation works thereafter.
  publish-repo:
    name: Publish signed apt+dnf repo to gh-pages
    runs-on: ubuntu-24.04
    needs: [build-deb, build-rpm, test-deb, test-rpm]
    if: github.event_name == 'release' || inputs.attach_to_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Install repo-building tools
        run: |
          sudo apt-get update -qq
          # apt-utils provides apt-ftparchive (apt repo metadata generator);
          # createrepo-c is the dnf repo metadata generator (the C variant
          # is faster than the Python one and is the modern default).
          sudo apt-get install -y --no-install-recommends \
            apt-utils createrepo-c gnupg

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          name: pamsignal-deb-${{ github.run_number }}
          path: ./incoming/deb

      - name: Download fedora rpm artifacts
        uses: actions/download-artifact@v7
        with:
          name: pamsignal-rpm-fedora-${{ github.run_number }}
          path: ./incoming/rpm-fedora

      - name: Download el9 rpm artifacts
        uses: actions/download-artifact@v7
        with:
          name: pamsignal-rpm-el9-${{ github.run_number }}
          path: ./incoming/rpm-el9

      - name: Set up signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$GPG_PASSPHRASE" > /tmp/.gpg-pass
          chmod 600 /tmp/.gpg-pass

      - name: Check out (or initialize) gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            ghpages-work
          cd ghpages-work
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            # `git clone --depth 1` only sets up the origin/main remote-tracking
            # ref, so a plain `git fetch origin gh-pages` updates FETCH_HEAD
            # without creating origin/gh-pages — which makes a subsequent
            # `git checkout gh-pages` fail with "pathspec did not match". Use a
            # refspec that materializes a local branch directly.
            git fetch origin gh-pages:gh-pages
            git checkout gh-pages
          else
            # First publish: create gh-pages as an orphan branch, purge
            # main-tree contents so the served site is just the repo.
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            echo "# pamsignal package repository" > README.md
            git add README.md
            git commit -m "Initialize gh-pages"
          fi

      - name: Publish public signing key
        run: |
          cd ghpages-work
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > key.asc

      - name: Build apt repository (Debian/Ubuntu)
        run: |
          cd ghpages-work
          # Layout: pool/ holds .deb files; dists/stable/ holds the index.
          mkdir -p pool/main/p/pamsignal
          mkdir -p dists/stable/main/binary-amd64
          # Copy fresh .deb / .ddeb in (overwrites prior version's files).
          cp -v ../incoming/deb/*.deb  pool/main/p/pamsignal/
          cp -v ../incoming/deb/*.ddeb pool/main/p/pamsignal/ || true
          # Generate Packages + Packages.gz (apt-ftparchive scans pool/).
          apt-ftparchive packages pool/ \
            > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages
          # Generate Release with hashes of the Packages files.
          cat > /tmp/aptftp.conf <<EOF
          APT::FTPArchive::Release::Origin "pamsignal";
          APT::FTPArchive::Release::Label "pamsignal";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Description "pamsignal release apt repo";
          EOF
          apt-ftparchive -c /tmp/aptftp.conf release dists/stable/ \
            > dists/stable/Release
          # Sign Release. Two outputs: detached Release.gpg (legacy apt) and
          # clearsigned InRelease (modern apt, single-file fetch). --yes is
          # required because the fetched gh-pages branch carries the prior
          # release's Release.gpg / InRelease at the same paths; without
          # --yes, gpg aborts with "signing failed: File exists".
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase-file /tmp/.gpg-pass \
              --default-key "${{ secrets.GPG_KEY_ID }}" \
              --detach-sign --armor \
              -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase-file /tmp/.gpg-pass \
              --default-key "${{ secrets.GPG_KEY_ID }}" \
              --clearsign \
              -o dists/stable/InRelease dists/stable/Release

      - name: Build dnf repositories (Fedora + EL9)
        run: |
          cd ghpages-work
          for variant in fedora el9; do
            mkdir -p rpm/$variant
            # Copy fresh RPMs (createrepo_c builds metadata from this dir).
            cp -v ../incoming/rpm-$variant/*.rpm rpm/$variant/ || true
            # Build/update repodata/. Use --update so a re-publish only
            # diffs the metadata instead of rebuilding from scratch.
            createrepo_c --update rpm/$variant/
            # Sign repomd.xml. dnf with repo_gpgcheck=1 verifies this. --yes
            # overwrites the prior release's repomd.xml.asc at the same path
            # (gpg refuses by default).
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase-file /tmp/.gpg-pass \
                --default-key "${{ secrets.GPG_KEY_ID }}" \
                --detach-sign --armor \
                -o rpm/$variant/repodata/repomd.xml.asc \
                   rpm/$variant/repodata/repomd.xml
          done
          # .repo files. Each variant gets its own pamsignal.repo so
          # `dnf config-manager --add-repo URL.repo` works directly.
          OWNER=${{ github.repository_owner }}
          REPO=$(basename "${{ github.repository }}")
          BASE="https://${OWNER}.github.io/${REPO}"
          for variant in fedora el9; do
            cat > rpm/$variant/pamsignal.repo <<REPO
          [pamsignal]
          name=pamsignal ($variant)
          baseurl=$BASE/rpm/$variant
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=$BASE/key.asc
          REPO
          done

      - name: Generate landing page (index.html)
        run: |
          cd ghpages-work
          OWNER=${{ github.repository_owner }}
          REPO=$(basename "${{ github.repository }}")
          BASE="https://${OWNER}.github.io/${REPO}"
          FPR=$(gpg --fingerprint --with-colons "${{ secrets.GPG_KEY_ID }}" \
                  | awk -F: '/^fpr/ {print $10; exit}')
          # Pretty-print fingerprint as 5-char groups separated by spaces.
          FPR_PRETTY=$(echo "$FPR" \
            | sed 's/.\{4\}/& /g; s/  *$//')
          cat > index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>pamsignal package repository</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 760px;
                     margin: 2em auto; padding: 0 1em; line-height: 1.5; }
              code, pre { background: #f4f4f4; }
              pre { padding: 1em; overflow-x: auto; }
              h1, h2 { border-bottom: 1px solid #ddd; padding-bottom: .3em; }
              .fpr { font-family: monospace; font-size: 1.05em; }
            </style>
          </head>
          <body>
            <h1>pamsignal package repository</h1>
            <p>Real-time PAM login monitor with multi-channel alerts. See
              the <a href="https://github.com/${OWNER}/${REPO}">project on
              GitHub</a> for source and documentation.</p>

            <h2>Signing key</h2>
            <p>Public key: <a href="key.asc">key.asc</a></p>
            <p>Fingerprint: <span class="fpr">$FPR_PRETTY</span></p>

            <h2>Debian / Ubuntu</h2>
            <pre><code>curl -fsSL $BASE/key.asc \\
            | sudo gpg --dearmor -o /usr/share/keyrings/pamsignal.gpg
          echo "deb [signed-by=/usr/share/keyrings/pamsignal.gpg] $BASE stable main" \\
            | sudo tee /etc/apt/sources.list.d/pamsignal.list
          sudo apt update
          sudo apt install pamsignal</code></pre>

            <h2>Fedora</h2>
            <pre><code>sudo dnf config-manager addrepo \\
            --from-repofile=$BASE/rpm/fedora/pamsignal.repo
          sudo dnf install pamsignal</code></pre>

            <h2>RHEL 9 / AlmaLinux 9 / Rocky Linux 9</h2>
            <pre><code>sudo dnf config-manager --add-repo \\
            $BASE/rpm/el9/pamsignal.repo
          sudo dnf install pamsignal</code></pre>

            <h2>Verifying a downloaded package</h2>
            <pre><code># Fetch the public key first
          curl -fsSLO $BASE/key.asc
          gpg --import key.asc

          # Verify a .deb (using the detached .asc from GitHub releases)
          gpg --verify pamsignal_X.Y.Z-1_amd64.deb.asc \\
                       pamsignal_X.Y.Z-1_amd64.deb

          # Verify a .rpm (signature is embedded in the file)
          rpm --import key.asc
          rpm -K pamsignal-X.Y.Z-1.\\*.rpm</code></pre>
          </body>
          </html>
          HTML

      - name: Commit + push gh-pages
        run: |
          cd ghpages-work
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No repository changes to publish."
          else
            git commit -m "Publish ${GITHUB_REF_NAME:-$GITHUB_SHA}"
            git push origin gh-pages
            echo "::notice::Published gh-pages."
          fi

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/.gpg-pass
